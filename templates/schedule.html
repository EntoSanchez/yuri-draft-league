{% extends "base.html" %}
{% block title %}Schedule – {{ league_name }}{% endblock %}
{% block head_extra %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── neon-noir tokens ── */
:root {
  --ink:#04040a; --panel:#0b0b12; --panel-2:#10101a;
  --hairline:rgba(232,232,248,.10); --hairline-2:rgba(232,232,248,.18);
  --magenta:#ff3d97; --magenta-dim:rgba(255,61,151,.5); --magenta-soft:rgba(255,61,151,.12);
  --cyan:#3de5ff; --cyan-dim:rgba(61,229,255,.55); --cyan-soft:rgba(61,229,255,.12);
  --lime:#c7ff52; --lime-soft:rgba(199,255,82,.10); --red:#ff5878; --amber:#ffc257;
  --text:#eaeaf2; --text-mute:rgba(234,234,242,.68); --text-dim:rgba(234,234,242,.46);
  --font-display:"Chakra Petch","Rajdhani",system-ui,sans-serif;
  --font-body:"Space Grotesk",system-ui,sans-serif;
  --font-mono:"JetBrains Mono","Fira Code",ui-monospace,monospace;
  --ease-out-cubic:cubic-bezier(.2,.7,.2,1);
  --ease-back-out:cubic-bezier(.34,1.56,.64,1);
}

/* ── page scaffold ── */
.sr-page {
  padding:24px 28px 28px; display:flex; flex-direction:column; gap:16px;
  font-family:var(--font-body); color:var(--text); background:var(--ink);
  min-height:calc(100vh - 56px); box-sizing:border-box;
}
.sr-scroll { flex:1; min-height:0; overflow-y:auto; }
.sr-scroll::-webkit-scrollbar { width:0; }

/* ── spotlight ── */
.sr-spotlight {
  position:relative; overflow:hidden;
  border:1px solid var(--magenta-dim);
  background:radial-gradient(120% 140% at 0% 0%,rgba(255,61,151,.10),transparent 55%),
             radial-gradient(120% 140% at 100% 100%,rgba(61,229,255,.08),transparent 55%),
             var(--panel);
  box-shadow:0 0 30px -12px var(--magenta-dim);
  padding:16px 22px;
}
.sr-spot-sweep {
  position:absolute; top:0; bottom:0; left:-30%; width:25%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);
  animation:sr-sweep 5.5s linear infinite; pointer-events:none;
}
@keyframes sr-sweep { to { left:130%; } }
@media (prefers-reduced-motion:reduce) { .sr-spot-sweep { animation:none; } }

/* ── vote bar ── */
.sr-wp-track { position:relative; height:12px; border:1px solid var(--hairline); display:flex; overflow:hidden; background:rgba(255,255,255,.04); }
.sr-wp-l { height:100%; background:var(--magenta); box-shadow:inset 0 0 10px rgba(255,61,151,.5); transition:width .8s var(--ease-back-out); }
.sr-wp-r { height:100%; background:var(--cyan); box-shadow:inset 0 0 10px rgba(61,229,255,.5); transition:width .8s var(--ease-back-out); }

/* ── week tabs ── */
.sr-tabs { position:relative; display:flex; border-bottom:1px solid var(--hairline); overflow-x:auto; }
.sr-tabs::-webkit-scrollbar { height:0; }
.sr-tab {
  background:transparent; border:0; border-right:1px solid var(--hairline);
  padding:9px 16px 8px; cursor:pointer; text-align:left; flex-shrink:0;
  transition:background .2s;
}
.sr-tab:hover { background:rgba(255,255,255,.025); }
.sr-tab.active { background:var(--magenta-soft); }
.sr-tab-k { font-family:var(--font-mono); font-size:8px; letter-spacing:.14em; color:var(--text-dim); }
.sr-tab-n {
  font-family:var(--font-display); font-weight:600; font-size:18px; line-height:1.05;
  color:var(--text-mute); transition:color .2s, text-shadow .2s;
}
.sr-tab.active .sr-tab-n { color:var(--magenta); text-shadow:0 0 16px var(--magenta-dim); }
.sr-tab-s { display:flex; align-items:center; gap:4px; font-family:var(--font-mono); font-size:8px; color:var(--text-dim); }
.sr-tab-dot { width:5px; height:5px; border-radius:50%; background:var(--text-dim); }
.sr-tab-dot.done { background:var(--lime); }
.sr-tab-dot.up { background:var(--cyan-dim); }
.sr-tab-underline {
  position:absolute; bottom:-1px; height:2px;
  background:var(--magenta); box-shadow:0 0 10px var(--magenta);
  transition:left .34s var(--ease-out-cubic), width .34s var(--ease-out-cubic);
  z-index:2; pointer-events:none;
}

/* ── controls ── */
.sr-controls { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.sr-seg { display:inline-flex; border:1px solid var(--hairline-2); }
.sr-seg button {
  background:transparent; border:0; border-right:1px solid var(--hairline);
  font-family:var(--font-mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--text-mute); padding:6px 12px; cursor:pointer; transition:all .15s;
}
.sr-seg button:last-child { border-right:0; }
.sr-seg button:hover { color:var(--text); }
.sr-seg button.on { color:var(--ink); background:var(--cyan); }
.sr-select {
  font-family:var(--font-mono); font-size:11px; color:var(--text);
  background:var(--panel-2) url("data:image/svg+xml,%3Csvg width='8' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l4 5 4-5z' fill='%233de5ff'/%3E%3C/svg%3E") no-repeat right 10px center;
  border:1px solid var(--hairline-2); padding:6px 26px 6px 10px;
  appearance:none; -webkit-appearance:none; cursor:pointer;
}
.sr-select:focus { outline:none; border-color:var(--cyan-dim); }
.sr-spacer { flex:1; }
.sr-toggle {
  display:inline-flex; align-items:center; gap:8px; cursor:pointer;
  font-family:var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--text-mute); user-select:none;
}
.sr-switch {
  width:30px; height:16px; border-radius:999px; position:relative;
  border:1px solid var(--hairline-2); background:rgba(255,255,255,.04); transition:all .2s;
  flex-shrink:0;
}
.sr-switch::after {
  content:""; position:absolute; top:1px; left:1px;
  width:12px; height:12px; border-radius:50%; background:var(--text-mute);
  transition:transform .2s, background .2s;
}
.sr-toggle.on .sr-switch { background:var(--magenta-soft); border-color:var(--magenta-dim); }
.sr-toggle.on .sr-switch::after { transform:translateX(14px); background:var(--magenta); }

/* ── match rows ── */
.sr-list { display:flex; flex-direction:column; }
.sr-row {
  display:grid; grid-template-columns:70px 1fr 92px 1fr 70px;
  align-items:center; gap:14px; padding:11px 14px;
  border-bottom:1px solid var(--hairline);
  transition:background .18s, box-shadow .18s;
  text-decoration:none; color:inherit;
}
.sr-row:hover { background:rgba(61,229,255,.04); box-shadow:inset 2px 0 0 var(--cyan); }
.sr-row .sr-logo { transition:transform .18s var(--ease-out-cubic); }
.sr-row:hover .sr-logo { transform:scale(1.12); }
.sr-reveal { opacity:1; transform:none; animation:sr-fade-up .45s var(--ease-out-cubic) backwards; }
@keyframes sr-fade-up { from { opacity:0; transform:translateY(8px); } }
@media (prefers-reduced-motion:reduce) { .sr-reveal { animation:none; } }

.sr-side { display:flex; align-items:center; gap:10px; min-width:0; }
.sr-side.right { justify-content:flex-end; }
.sr-side.lose .sr-name, .sr-side.lose .sr-logo { opacity:.5; }
.sr-name {
  font-family:var(--font-display); font-weight:600; font-size:13px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-transform:uppercase;
}
.sr-coach { font-family:var(--font-mono); font-size:9px; color:var(--text-dim); }
.sr-logo {
  width:30px; height:30px; border-radius:50%; flex:0 0 auto;
  background-color:var(--panel-2); border:1px solid var(--hairline);
  object-fit:contain; display:inline-flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--text-dim);
  flex-shrink:0;
}
img.sr-logo { display:block; }
.sr-logo.xl { width:84px; height:84px; font-size:28px; }
.sr-score {
  position:relative; overflow:hidden;
  font-family:var(--font-mono); font-size:17px; font-weight:600;
  text-align:center; padding:5px 8px;
  border:1px solid var(--hairline); min-width:76px;
  font-variant-numeric:tabular-nums;
}
.sr-score.up { color:var(--cyan); font-size:11px; letter-spacing:.06em; padding:8px; }
.sr-score.hidden { cursor:pointer; color:var(--text-dim); }
.sr-score.hidden:hover { border-color:var(--cyan-dim); }
.sr-score-wipe {
  position:absolute; inset:0; width:36px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  animation:sr-wipe .42s ease-out; pointer-events:none;
}
@keyframes sr-wipe { from { left:-36px; } to { left:100%; } }
.sr-score .dim { color:var(--text-dim); }
.sr-wktag { font-family:var(--font-mono); font-size:9px; color:var(--text-dim); letter-spacing:.04em; }
.sr-status { text-align:right; }
.sr-chip {
  display:inline-flex; align-items:center; gap:6px;
  font-family:var(--font-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase;
  padding:3px 8px; border:1px solid var(--hairline-2); color:var(--text-mute);
}
.sr-chip.cyan { color:var(--cyan); border-color:var(--cyan-dim); background:var(--cyan-soft); }
.sr-chip.lime { color:var(--lime); border-color:rgba(199,255,82,.35); background:var(--lime-soft); }
.sr-chip.mag  { color:var(--magenta); border-color:var(--magenta-dim); background:var(--magenta-soft); }
.sr-empty { padding:40px; text-align:center; font-family:var(--font-mono); font-size:11px; color:var(--text-dim); letter-spacing:.1em; }

@media (max-width: 540px) {
  /* Match rows: drop score-column width, keep teams readable */
  .sr-row { grid-template-columns: 1fr auto 1fr; }
  /* Hide week tag and match status chip to save space */
  .sr-wktag, .sr-status { display: none; }
  /* Score box stays but smaller */
  .sr-score { min-width: 56px; font-size: 16px; padding: 6px; }
  /* Tab bar: snap scrolling for easier swipe nav */
  .sr-tabs { scroll-snap-type: x mandatory; }
  .sr-tab  { scroll-snap-align: start; }
  /* Spotlight scores: scale down for narrow screens */
  .sr-spot-score { font-size: 32px !important; }
}
</style>
{% endblock %}
{% block content %}

<div class="sr-page">

  <!-- 1. Header row -->
  <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap">
    <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;color:var(--magenta);">// MATCH.GRID</span>
    <span style="font-family:var(--font-display);font-weight:600;font-size:24px;">Schedule</span>
    <span style="flex:1;height:1px;background:var(--hairline);align-self:center;min-width:20px"></span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim);" id="sr-meta">{{ league_name|upper }} · {{ num_teams }} TEAMS · {{ total_matches }} MATCHES</span>
  </div>

  <!-- 2. Match of the Week spotlight -->
  <div id="sr-spotlight"></div>

  <!-- 3. Week tabs -->
  <div class="sr-tabs" id="sr-tabs">
    <div style="flex:1;border-bottom:0"></div>
    <div class="sr-tab-underline" id="sr-underline" style="left:0;width:0"></div>
  </div>

  <!-- 4. Controls -->
  <div class="sr-controls" id="sr-controls">
    <div class="sr-seg" id="sr-seg">
      <button onclick="setSt('ALL')" id="seg-ALL" class="on">ALL</button>
      <button onclick="setSt('FINAL')" id="seg-FINAL">FINAL</button>
      <button onclick="setSt('UPCOMING')" id="seg-UPCOMING">UPCOMING</button>
    </div>
    <select class="sr-select" id="sr-team-sel" onchange="setTeam(this.value)">
      <option value="all">ALL TEAMS</option>
    </select>
    <div class="sr-spacer"></div>
    <div class="sr-toggle" id="sr-toggle" onclick="toggleSpoilers()">
      <span class="sr-switch"></span><span id="sr-toggle-label">SPOILERS OFF</span>
    </div>
  </div>

  <!-- 5. Match list -->
  <div class="sr-scroll">
    <div class="sr-list" id="sr-list"></div>
  </div>

</div>

<script>
const SCHEDULE = {{ schedule_json | safe }};
const COACHES  = {{ coaches_json | safe }};
const CURRENT_WEEK = {{ current_week }};

// ── state ──────────────────────────────────────────────────────────
let S = {
  week: CURRENT_WEEK,
  status: "ALL",
  team: "all",
  spoilers: false,
  revealed: {},
};

// ── helpers ────────────────────────────────────────────────────────
function weekData(w) { return SCHEDULE.find(x => x.week === w) || SCHEDULE[0]; }
function pad2(n) { return String(n).padStart(2,"0"); }
function motwMatch(wk) { return wk.matches.find(m => m.id === wk.motwId) || wk.matches[0]; }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;"); }
function initials(name) { return (name||"").replace(/[^a-zA-Z0-9 ]/g,"").split(" ").filter(Boolean).map(w=>w[0]).join("").slice(0,2).toUpperCase() || "??"; }
function logoEl(url, team, cls) {
  cls = "sr-logo" + (cls ? " "+cls : "");
  const ini = initials(team);
  if (url) return `<img src="${esc(url)}" class="${cls}" alt="${esc(ini)}" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'${cls}',textContent:'${ini.replace(/'/g,"")}'}))">`;
  return `<span class="${cls}">${ini}</span>`;
}

// ── team filter population ─────────────────────────────────────────
(function populateTeams() {
  const sel = document.getElementById("sr-team-sel");
  [...COACHES].sort((a,b) => a.name.localeCompare(b.name)).forEach(t => {
    const o = document.createElement("option");
    o.value = t.id; o.textContent = t.name.toUpperCase();
    sel.appendChild(o);
  });
})();

// ── tab underline ──────────────────────────────────────────────────
function measureUnderline() {
  const el = document.querySelector(`[data-wk="${S.week}"]`);
  if (!el) return;
  const ul = document.getElementById("sr-underline");
  ul.style.left  = el.offsetLeft + "px";
  ul.style.width = el.offsetWidth + "px";
}
window.addEventListener("resize", measureUnderline);

// ── render tabs ────────────────────────────────────────────────────
function renderTabs() {
  const tabsEl = document.getElementById("sr-tabs");
  // Clear existing tabs but keep the spacer and underline
  tabsEl.querySelectorAll(".sr-tab").forEach(e => e.remove());
  const spacer = tabsEl.querySelector("div");
  SCHEDULE.forEach(wk => {
    const btn = document.createElement("button");
    btn.className = "sr-tab" + (wk.week === S.week ? " active" : "");
    btn.dataset.wk = wk.week;
    btn.onclick = () => setWeek(wk.week);
    const dotCls = wk.state === "DONE" ? "done" : "up";
    btn.innerHTML = `
      <div class="sr-tab-k">WEEK</div>
      <div class="sr-tab-n">${pad2(wk.week)}</div>
      <div class="sr-tab-s"><span class="sr-tab-dot ${dotCls}"></span>${wk.state}</div>`;
    tabsEl.insertBefore(btn, spacer);
  });
  measureUnderline();
}

// ── render spotlight ───────────────────────────────────────────────
function renderSpotlight() {
  const el = document.getElementById("sr-spotlight");
  const wk = weekData(S.week);
  if (!wk || !wk.matches.length) { el.innerHTML = ""; return; }
  const m = motwMatch(wk);
  const final = m.status === "FINAL";
  const showScore = S.spoilers || S.revealed[m.id] || !final;
  const winA = final && m.score1 > m.score2;
  const winB = final && m.score2 > m.score1;
  const isUpset = m.motw && wk.state === "DONE" && m.fav_id !== null &&
    ((m.fav_id === m.c1_id && m.score2 > m.score1) || (m.fav_id === m.c2_id && m.score1 > m.score2));
  const motwKind = isUpset ? "BIGGEST UPSET" : "CLOSEST PICK'EM";
  const chipCls = isUpset ? "mag" : final ? "lime" : "cyan";
  const chipTxt = final ? (isUpset ? "UPSET · FINAL" : "FINAL") : "TOSS-UP";
  const poolMeta = m.pool && m.pool !== "X" ? ` · POOL ${m.pool}` : "";

  el.innerHTML = `
    <div class="sr-spotlight">
      <div class="sr-spot-sweep"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;color:var(--magenta);">★ MATCH OF THE WEEK</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim);">WK${pad2(m.week||S.week)}${poolMeta} · ${motwKind}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px">
        <div style="display:flex;align-items:center;gap:14px;justify-content:flex-end;opacity:${winB?.5:1}">
          <div style="text-align:right">
            <div style="font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:.02em;text-transform:uppercase;">${esc(m.c1_team)}</div>
            <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-dim);">COACH · ${esc(m.c1_name.toUpperCase())}</div>
          </div>
          <a href="/team/${m.c1_id}" style="flex-shrink:0">${logoEl(m.c1_logo, m.c1_team, "xl")}</a>
        </div>
        <div style="text-align:center;min-width:150px">
          ${showScore && final
            ? `<div style="font-family:var(--font-display);font-weight:700;font-size:56px;line-height:1;font-variant-numeric:tabular-nums">${m.score1}<span style="opacity:.35;padding:0 6px;font-size:36px">:</span>${m.score2}</div>`
            : `<div style="font-family:var(--font-display);font-weight:700;font-size:30px;color:var(--cyan)">VS</div>`}
          <div style="margin-top:6px"><span class="sr-chip ${chipCls}">${chipTxt}</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:14px;opacity:${winA?.5:1}">
          <a href="/team/${m.c2_id}" style="flex-shrink:0">${logoEl(m.c2_logo, m.c2_team, "xl")}</a>
          <div>
            <div style="font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:.02em;text-transform:uppercase;">${esc(m.c2_team)}</div>
            <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-dim);">COACH · ${esc(m.c2_name.toUpperCase())}</div>
          </div>
        </div>
      </div>
      <div style="margin-top:12px">
        <div class="sr-wp-track">
          <div class="sr-wp-l" style="width:${m.vote1}%"></div>
          <div class="sr-wp-r" style="width:${m.vote2}%"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:4px">
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--magenta);">${m.vote1}%</span>
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim);">PICK'EMS VOTE</span>
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--cyan);">${m.vote2}%</span>
        </div>
      </div>
    </div>`;
}

// ── render match list ──────────────────────────────────────────────
function renderList() {
  const listEl = document.getElementById("sr-list");
  const wk = weekData(S.week);
  if (!wk) { listEl.innerHTML = `<div class="sr-empty">NO SCHEDULE DATA</div>`; return; }

  let rows = wk.matches;
  if (S.status !== "ALL") rows = rows.filter(m => m.status === S.status);
  if (S.team !== "all") rows = rows.filter(m => m.c1_id == S.team || m.c2_id == S.team);

  if (!rows.length) {
    listEl.innerHTML = `<div class="sr-empty">NO MATCHES MATCH THESE FILTERS</div>`;
    return;
  }

  const wipeId = `wipe-${Date.now()}`;
  listEl.innerHTML = rows.map((m, i) => {
    const final = m.status === "FINAL";
    const showScore = S.spoilers || S.revealed[m.id] || !final;
    const winA = final && m.score1 > m.score2;
    const winB = final && m.score2 > m.score1;
    const poolTag = m.pool ? ` · ${m.pool}` : "";

    let scoreHtml;
    if (final && !showScore) {
      scoreHtml = `<div class="sr-score hidden" onclick="revealScore(${m.id})" title="Click to reveal">• : •</div>`;
    } else if (final) {
      scoreHtml = `<div class="sr-score">${m.score1}<span class="dim"> : </span>${m.score2}<span class="sr-score-wipe"></span></div>`;
    } else {
      scoreHtml = `<div class="sr-score up">VS</div>`;
    }

    return `<div class="sr-row sr-reveal" style="animation-delay:${i*45}ms">
      <div class="sr-wktag">WK${pad2(m.week||S.week)}${poolTag}${m.motw ? `<span style="color:var(--magenta);margin-left:4px">★</span>` : ""}</div>
      <div class="sr-side right${winB ? " lose" : ""}">
        <div style="text-align:right;min-width:0">
          <div class="sr-name">${esc(m.c1_team)}</div>
          <div class="sr-coach">${esc(m.c1_name)}</div>
        </div>
        <a href="/team/${m.c1_id}" style="flex-shrink:0">${logoEl(m.c1_logo, m.c1_team)}</a>
      </div>
      ${scoreHtml}
      <div class="sr-side${winA ? " lose" : ""}">
        <a href="/team/${m.c2_id}" style="flex-shrink:0">${logoEl(m.c2_logo, m.c2_team)}</a>
        <div style="min-width:0">
          <div class="sr-name">${esc(m.c2_team)}</div>
          <div class="sr-coach">${esc(m.c2_name)}</div>
        </div>
      </div>
      <div class="sr-status">
        <span class="sr-chip${final ? "" : " cyan"}">${m.status}</span>
        ${final && m.has_recap ? `<a href="/match/${m.id}" style="display:block;margin-top:4px;font-family:var(--font-mono);font-size:8px;letter-spacing:.1em;color:var(--magenta);border:1px solid var(--magenta-dim);padding:1px 6px;text-decoration:none;white-space:nowrap">RECAP ▸</a>` : ""}
      </div>
    </div>`;
  }).join("");
}

// ── state setters ──────────────────────────────────────────────────
function setWeek(w) {
  S.week = w;
  renderTabs();
  renderSpotlight();
  renderList();
}

function setSt(v) {
  S.status = v;
  document.querySelectorAll(".sr-seg button").forEach(b => b.classList.toggle("on", b.id === "seg-" + v));
  renderList();
}

function setTeam(v) {
  S.team = v;
  renderList();
}

function toggleSpoilers() {
  S.spoilers = !S.spoilers;
  const tog = document.getElementById("sr-toggle");
  tog.classList.toggle("on", S.spoilers);
  document.getElementById("sr-toggle-label").textContent = "SPOILERS " + (S.spoilers ? "ON" : "OFF");
  renderSpotlight();
  renderList();
}

function revealScore(matchId) {
  S.revealed[matchId] = true;
  renderSpotlight();
  renderList();
}

// ── boot ───────────────────────────────────────────────────────────
// Default to first upcoming week; fall back to last week
(function initWeek() {
  const first_upcoming = SCHEDULE.find(w => w.state === "UPCOMING");
  S.week = first_upcoming ? first_upcoming.week : (SCHEDULE.length ? SCHEDULE[SCHEDULE.length-1].week : CURRENT_WEEK);
})();

renderTabs();
renderSpotlight();
renderList();

// Measure underline after layout
requestAnimationFrame(() => requestAnimationFrame(measureUnderline));
</script>
{% endblock %}
