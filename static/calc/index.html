<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Damage Calculator — Yuri Cup S9</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/damage-calc/styles/calc.css" />
</head>
<body>
  <!-- ============ Top nav (matches league site) ============ -->
  <nav class="nav">
    <a class="nav-logo" href="/" style="text-decoration:none;color:inherit">
      <span class="nav-logo-mark"></span>
      <span class="txt"><b>Yuri Cup</b><small>SEASON 9</small></span>
    </a>
    <div class="nav-items">
      <a class="nav-item" href="/">Home</a>
      <a class="nav-item" href="/standings">Standings</a>
      <a class="nav-item" href="/schedule">Schedule</a>
      <a class="nav-item" href="/draftboard">Draft Board</a>
      <a class="nav-item" href="/rules">Rules</a>
      <a class="nav-item active" href="/damage-calc">Calc</a>
    </div>
    <div class="nav-end">
      <span class="nav-pill"><span class="dot"></span> ENGINE ONLINE</span>
    </div>
  </nav>

  <div class="wrap">
    <!-- ============ Page head + controls ============ -->
    <div class="page-head">
      <div class="title-col">
        <span class="eyebrow">// tools.damage_calc</span>
        <h1 class="page-title">Damage <em>Calculator</em></h1>
      </div>
      <div class="controls">
        <div class="ctl">
          <label>Generation</label>
          <select class="field" id="gen-select" style="min-width:118px"></select>
        </div>
        <div class="ctl">
          <label>Format / Metagame</label>
          <select class="field" id="format-select" style="min-width:150px"><option value="All">All Formats</option></select>
        </div>
        <div class="ctl">
          <label>&nbsp;</label>
          <button class="btn" id="btn-animated" title="Use animated sprites where available">✦ Animated</button>
        </div>
        <div class="ctl">
          <label>&nbsp;</label>
          <button class="btn cyan" id="btn-roll" style="display:none">⟳ Roll</button>
        </div>
        <div class="ctl">
          <label>&nbsp;</label>
          <button class="btn" id="btn-export">Export</button>
        </div>
        <div class="ctl">
          <label>&nbsp;</label>
          <button class="btn" id="btn-reset">Reset</button>
        </div>
      </div>
    </div>

    <!-- ============ Mode tabs ============ -->
    <div style="padding:0 24px 14px">
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="1v1">1 v 1</button>
        <button class="mode-tab" data-mode="1vAll">1 v All</button>
        <button class="mode-tab" data-mode="Allv1">All v 1</button>
        <button class="mode-tab" data-mode="random">Random Battle</button>
      </div>
    </div>

    <!-- ============ Combatant board ============ -->
    <div class="board" id="board">
      <div id="panel-a"></div>
      <div id="panel-b"></div>
      <div id="pool-mount" style="display:none"></div>
    </div>

    <!-- ============ Results ============ -->
    <div id="results-row" style="padding:0 24px 18px">
      <div id="results-mount"></div>
    </div>

    <!-- ============ Field ============ -->
    <div id="field-row" style="padding:0 24px 28px">
      <div id="field-mount"></div>
    </div>

    <!-- ============ Footer ============ -->
    <div class="foot">
      <span class="eyebrow">YURI CUP S9</span>
      <span class="sep">//</span>
      <span class="eyebrow" style="color:var(--text-dim)">Powered by the @smogon/calc engine</span>
      <span class="sep">//</span>
      <span class="eyebrow" style="color:var(--text-dim)">Mechanics accurate · Gens 1–9</span>
    </div>
  </div>

  <!-- ============ Import / Export modal ============ -->
  <div class="modal-back" id="modal-back">
    <div class="modal" id="modal">
      <div class="modal-head">
        <h3 id="modal-title">Import Set</h3>
        <button class="x" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <textarea id="modal-text" spellcheck="false"></textarea>
        <div id="modal-name-row" style="display:none">
          <input class="field" id="modal-name" style="width:100%;height:34px" placeholder="Set name" spellcheck="false">
        </div>
        <span class="modal-hint" id="modal-hint"></span>
        <div class="modal-actions">
          <button class="btn primary" id="modal-confirm">Import Set</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div id="tweaks-root"></div>

  <!-- ============ Engine + app ============ -->
  <script src="https://unpkg.com/@smogon/calc@0.10.0/dist/data/production.min.js"></script>
  <script src="https://unpkg.com/@smogon/calc@0.10.0/dist/production.min.js"></script>
  <script src="/damage-calc/js/data.js"></script>
  <script src="/damage-calc/js/combo.js"></script>
  <script src="/damage-calc/js/sets.js"></script>
  <script src="/damage-calc/js/engine.js"></script>
  <script src="/damage-calc/js/randoms.js"></script>
  <script src="/damage-calc/js/ui-mon.js"></script>
  <script src="/damage-calc/js/ui-field.js"></script>
  <script src="/damage-calc/js/ui-results.js"></script>
  <script src="/damage-calc/js/ui-modes.js"></script>
  <script src="/damage-calc/js/app.js"></script>

  <!-- ============ Tweaks (React island) ============ -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="/damage-calc/tweaks-panel.jsx"></script>
  <script type="text/babel" src="/damage-calc/js/tweaks-app.jsx"></script>
</body>
</html>
